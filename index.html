<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tính C(n,k)</title>
<style>
body{
    font-family: Arial;
    margin:40px;
}
input{
    width:100px;
    margin:5px;
}
button{
    margin-top:10px;
    padding:8px 15px;
}
</style>
</head>
<body>

<h2>Tính C(n,k) mod 1e9+7</h2>

<p>n:</p>
<input type="number" id="n">

<p>k:</p>
<input type="number" id="k">

<br>

<button onclick="solve()">Tính</button>

<h3 id="ans"></h3>

<script>

const MOD=1000000007n;

function power(a,b){
    a=BigInt(a);
    b=BigInt(b);

    let res=1n;

    while(b>0n){
        if(b&1n)
            res=res*a%MOD;
        a=a*a%MOD;
        b>>=1n;
    }

    return res;
}

function C(n,k){

    n=BigInt(n);
    k=BigInt(k);

    let ans=1n;

    for(let i=k+1n;i<=n;i++)
        ans=ans*i%MOD;

    for(let i=1n;i<=n-k;i++)
        ans=ans*power(i,MOD-2n)%MOD;

    return ans;
}

function solve(){

    let n=document.getElementById("n").value;
    let k=document.getElementById("k").value;

    document.getElementById("ans").innerHTML=
    "Kết quả: "+C(n,k).toString();

}

</script>

</body>
</html>
