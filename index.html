<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tra cứu phụ huynh 9A8-THCS Gia Cẩm</title>

<!-- ĐÃ THÊM: Logo nhỏ hiển thị trên tab trình duyệt -->
<link rel="icon" type="image/png" href="download.png?v=3">

<style>
/* Căn giữa toàn bộ trang theo cả chiều dọc và chiều ngang */
html, body {
    height: 100%;
    margin: 0;
}
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
}
/* Khung chứa nội dung được bo góc, đổ bóng và căn giữa */
.container {
    background: #ffffff;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    text-align: center;
    max-width: 450px;
    width: 90%;
}
h2 {
    margin-top: 0;
    color: #333;
}
.huong-dan {
    color: #666;
    font-style: italic;
    margin-bottom: 20px;
    font-size: 14px;
}
/* Ô nhập liệu */
input {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 5px;
    box-sizing: border-box;
    margin-bottom: 15px;
}
/* Nút bấm */
button {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    background-color: #007bff;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.2s;
}
button:hover {
    background-color: #0056b3;
}
/* Kết quả hiển thị */
#kq {
    margin-top: 25px;
    font-size: 18px;
    color: #155724;
    background-color: #d4edda;
    border: 1px solid #c3e6cb;
    padding: 15px;
    border-radius: 5px;
    white-space: pre-wrap;
    text-align: left;
    display: none; /* Ẩn đi khi chưa tìm kiếm */
}
</style>
</head>
<body>

<div class="container">
    <h2>Tra cứu tên phụ huynh 9A8</h2>
    <h2>       THCS Gia Cẩm      </h2>
    <p class="huong-dan">Lưu ý: Nhập tên không dấu (Ví dụ: Nguyen Van A)</p>
    
    <input type="text" id="ten" placeholder="Nhập họ và tên học sinh..." onkeydown="if(event.key === 'Enter') tim()">
    <button onclick="tim()">Tra cứu</button>
    
    <div id="kq"></div>
</div>

<script>
const ds = {
    "nguyen kieu anh":"Bố: Nguyễn Quý Thành\nMẹ: Bùi Thị Kim Thúy",
    "phan hoang anh":"Bố: Phan Mạnh Tưởng\nMẹ: Vũ Thị Linh",
    "ha hai binh":"Bố: Hà Phương Lâm\nMẹ: Nguyễn Thị Thanh Vân",
    "nguyen cong binh":"Bố: Nguyễn Công Chính\nMẹ: Vương Ngọc Phương",
    "chu ngoc cham":"Bố: Chu Mạnh Cường\nMẹ: Phí Thị Kim Dung",
    "nguyen khanh dat":"Bố: Nguyễn Văn Tuấn\nMẹ: Nguyễn Thị Nguyên",
    "tran tri dung":"Bố: Trần Văn Chí\nMẹ: Nguyễn Thị Hồng Nhung",
    "lo khanh duy":"Bố: Lò Văn Thanh\nMẹ: Tòng Thị Hoa",
    "cao duc giang":"Bố: Cao Xuân Hoạt\nMẹ: Quách Thị Thanh Tuyền",
    "chu hong hai":"Bố: Chu Hồng Thái\nMẹ: Bùi Thị Tuyết Lan",
    "hoang duc hai":"Bố: Hoàng Văn Chuyên\nMẹ: Đặng Thị Lan Hương",
    "dao dung hieu":"Bố: Đào Vinh Quang\nMẹ: Trần Thị Thu Hường",
    "dinh van nhat hoang":"Bố: Đinh Văn Khánh\nMẹ: Nguyễn Thanh Yên",
    "chu gia huy":"Bố: Chu Ngọc Sơn\nMẹ: Lê Thị Hưng",
    "tran bao huy":"Bố: Trần Anh Minh\nMẹ: Lã Phương Thảo",
    "hoang xuan khanh":"Bố: Hoàng Xuân Hòa\nMẹ: Hoàng Thị Lệ",
    "nguyen duc khanh":"Bố: Nguyễn Mạnh Hùng\nMẹ: Vũ Thị Hòa",
    "ta gia khanh":"Bố: Tạ Hùng Cường\nMẹ: Cao Thị Phương Thúy",
    "dao trong khoi":"Bố: Đào Trọng Tấn\nMẹ: Nguyễn Thị Thúy",
    "nguyen chi kien":"Bố: Nguyễn Mạnh Hà\nMẹ: Đặng Thị Hồng Vĩnh",
    "nguyen le viet lam":"Bố: Nguyễn Thành Nam\nMẹ: Lê Thị Thu Hạnh",
    "nguyen quang minh":"Bố: Nguyễn Giang Sơn\nMẹ: Lương Thu Hà",
    "nguyen tuan minh":"Bố: Nguyễn Việt Tiến\nMẹ: Nguyễn Thị Kim Dung",
    "do nhat nam":"Bố: Đỗ Hải Hoàng Sơn\nMẹ: Lê Thị Vân Anh",
    "bui kim ngan":"Bố: Bùi Đăng Ninh\nMẹ: Nguyễn Thị Thu Nghĩa",
    "bui kim ngoc":"Bố: Bùi Văn Thụy\nMẹ: Nguyễn Thị Lương",
    "le bao ngoc":"Bố: Lê Quang Lợi\nMẹ: Hoàng Thị Hồng Linh",
    "nguyen thao ngoc":"Bố: Nguyễn Tiến Việt\nMẹ: Nguyễn Kim Ngân",
    "tran dang ninh":"Bố: Trần Vĩ Tùng\nMẹ: Bùi Thị Thịnh",
    "cao minh quan":"Bố: Cao Đức Cảnh\nMẹ: Lưu Thị Lan",
    "do minh quan":"Bỗ: Đỗ Tất Thắng\nMẹ: Nguyễn Thị Tuyết",
    "nguyen anh quan":"Bố: Nguyễn Việt Dũng\nMẹ: Phạm Thị Việt Hà",
    "nguyen phuong thao":"Bố: Nguyễn Tiến Dũng\nMẹ: Đoàn Thị Thu Hà",
    "tran anh thu":"Bố: Trần Tuấn Anh\nMẹ: Vũ Thị Huệ Minh",
    "dao thu trang":"Bố: Đào Văn Bằng\nMẹ: Nguyễn Thị Kim Thư",
    "phi bao trang":"Bố: Phí Quốc Huy\nMẹ: Lê Thị Nhung",
    "nguyen vu tuan":"Bố: Nguyễn Hải Dương\nMẹ: Vũ Thị Quỳnh Anh",
    "cao duc vuong":"Bố: Cao Anh Tuấn\nMẹ: Nguyễn Thị Lệ Hằng",
    "nguyen minh vuong":"Bố: Nguyễn Minh Cường\nMẹ: Nguyễn Thị Thu Huyền",
    "dinh anh tuan":"Bố: Không biết tên gì\nMẹ: Quỳnh Đá Quý",
    "le huy hoang":"Bố: Lê Huy Luận\nMẹ: Thanh Loan"
};

function tim(){
    let ten = document.getElementById("ten").value.toLowerCase().trim();
    let kq = document.getElementById("kq");

    if(ds[ten]){
        kq.style.display = "block";
        kq.style.color = "#155724";
        kq.style.backgroundColor = "#d4edda";
        kq.style.borderColor = "#c3e6cb";
        kq.innerText = ds[ten];
    } else {
        kq.style.display = "block";
        kq.style.color = "#721c24";
        kq.style.backgroundColor = "#f8d7da";
        kq.style.borderColor = "#f5c6cb";
        kq.innerText = "Không tìm thấy tên học sinh này trong danh sách lớp 9A8.";
    }
}
</script>

</body>
</html>
